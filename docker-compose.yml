version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: kuafor_postgres
    restart: always
    environment:
      POSTGRES_USER: kuafor_user
      POSTGRES_PASSWORD: kuafor_password
      POSTGRES_DB: kuafor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kuafor_network

  redis:
    image: redis:7-alpine
    container_name: kuafor_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kuafor_network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: kuafor_keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/kuafor_db
      KC_DB_USERNAME: kuafor_user
      KC_DB_PASSWORD: kuafor_password
      # Bu değişkenler Keycloak ilk ayağa kalktığında admin kullanıcısını oluşturur.
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/kuafor-realm.json:/opt/keycloak/data/import/realm.json
    depends_on:
      - postgres
    networks:
      - kuafor_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kuafor_backend
    restart: always
    environment:
      POSTGRES_HOST: kuafor_postgres
      POSTGRES_USER: kuafor_user
      POSTGRES_PASSWORD: kuafor_password
      POSTGRES_DB: kuafor_db
      GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY:-}"
    depends_on:
      - postgres
      - redis
    networks:
      - kuafor_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kuafor_frontend
    restart: always
    networks:
      - kuafor_network

  nginx:
    image: nginx:alpine
    container_name: kuafor_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - frontend
      - backend
    networks:
      - kuafor_network

volumes:
  postgres_data:
  redis_data:


networks:
  kuafor_network:
    driver: bridge
