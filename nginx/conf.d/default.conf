server {
    listen 80;
    server_name sistemrandevu.biasdanismanlik.com www.sistemrandevu.biasdanismanlik.com auth-sistemrandevu.biasdanismanlik.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        # Sadece ana domain için HTTPS yonlendirmesi
        if ($host = "sistemrandevu.biasdanismanlik.com") {
            return 301 https://$host$request_uri;
        }
        if ($host = "www.sistemrandevu.biasdanismanlik.com") {
            return 301 https://$host$request_uri;
        }
        if ($host = "auth-sistemrandevu.biasdanismanlik.com") {
            return 301 https://$host$request_uri;
        }
    }
}

server {
    listen 443 ssl;
    server_name sistemrandevu.biasdanismanlik.com www.sistemrandevu.biasdanismanlik.com;

    ssl_certificate /etc/letsencrypt/live/sistemrandevu.biasdanismanlik.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sistemrandevu.biasdanismanlik.com/privkey.pem;

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }

    location ^~ /api/auth/ {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }

    location ^~ /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name auth-sistemrandevu.biasdanismanlik.com;

    ssl_certificate /etc/letsencrypt/live/sistemrandevu.biasdanismanlik.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sistemrandevu.biasdanismanlik.com/privkey.pem;

    location / {
        proxy_pass http://keycloak:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }
}
