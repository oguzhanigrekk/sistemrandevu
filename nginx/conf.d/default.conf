server {
    listen 80;
    server_name sistemrandevu.biasdanismanlik.com www.sistemrandevu.biasdanismanlik.com;

    # Let's Encrypt HTTP Challenge için (Opsiyonel)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTP'den HTTPS'e otomatik yönlendirme (SSL sertifikasını kurduğunuzda burayı açın ve aşağıdaki "/" ve "/api/" bloklarını SSL bloğunun içine taşıyın)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        # Backend container internal port 3000
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

